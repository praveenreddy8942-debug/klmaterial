<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0b0f2e"/>
      <stop offset="100%" stop-color="#080c1e"/>
    </linearGradient>

    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#0077ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <linearGradient id="kGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8e6ff"/>
    </linearGradient>

    <linearGradient id="lGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>

    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="kGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#00d4ff" flood-opacity="0.4"/>
    </filter>

    <clipPath id="c">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle diagonal light sweep -->
    <rect x="-100" y="-100" width="350" height="720"
          fill="#ffffff" opacity="0.025"
          transform="rotate(-35 256 256)"/>

    <!-- Outer decorative ring -->
    <circle cx="256" cy="236" r="182"
            fill="none" stroke="url(#ring)" stroke-width="2"
            stroke-dasharray="14 7"
            stroke-linecap="round"
            opacity="0.35" filter="url(#ringGlow)"/>

    <!-- Inner solid ring glow -->
    <circle cx="256" cy="236" r="155"
            fill="none" stroke="#00d4ff" stroke-width="1"
            opacity="0.12"/>

    <!-- Four corner diamond accents -->
    <polygon points="256,60  266,72  256,84  246,72"  fill="#00d4ff" opacity="0.45"/>
    <polygon points="256,388 266,400 256,412 246,400" fill="#0077ff" opacity="0.45"/>
    <polygon points="74,236  86,246  74,256  62,246"  fill="#00d4ff" opacity="0.35"/>
    <polygon points="438,236 450,246 438,256 426,246" fill="#0077ff" opacity="0.35"/>

    <!-- ── KL monogram ── -->
    <!-- "K" — white/light -->
    <text
      x="142" y="310"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="200"
      font-weight="900"
      fill="url(#kGrad)"
      text-anchor="middle"
      filter="url(#kGlow)">K</text>

    <!-- "L" — cyan/blue -->
    <text
      x="372" y="310"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="200"
      font-weight="900"
      fill="url(#lGrad)"
      text-anchor="middle"
      filter="url(#kGlow)">L</text>

    <!-- Thin separator line between K and L -->
    <line x1="256" y1="120" x2="256" y2="320"
          stroke="#00d4ff" stroke-width="1.5" opacity="0.2"
          stroke-dasharray="6 5"/>

    <!-- Bottom label -->
    <text
      x="256" y="462"
      font-family="'Helvetica Neue', Arial, sans-serif"
      font-size="28"
      font-weight="600"
      fill="#00d4ff"
      text-anchor="middle"
      letter-spacing="8"
      opacity="0.7">MATERIAL</text>

    <!-- Accent line under label -->
    <rect x="190" y="470" width="132" height="2.5" rx="1.25"
          fill="url(#ring)" opacity="0.55"/>

    <!-- Outer inset border -->
    <rect x="9" y="9" width="494" height="494" rx="105" ry="105"
          fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.06"/>
  </g>
</svg>
